name: Build Executables

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then \
          pyinstaller --onefile --name MdnsBroadcaster --distpath dist/windows src/Main.py; \
        else \
          pyinstaller --onefile --name MdnsBroadcaster --distpath dist/linux src/Main.py; \
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-executable
        path: |
          dist/windows/MdnsBroadcaster.exe
          dist/linux/MdnsBroadcaster

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: "*-executable"
        merge-multiple: true
        path: .

    - name: Create or update GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view v1.0.0 >/dev/null 2>&1 || gh release create v1.0.0 --title "Release v1.0.0" --notes "This release includes the following executables:
        - Windows executable
        - Linux executable"
        gh release upload v1.0.0 dist/windows/MdnsBroadcaster.exe dist/linux/MdnsBroadcaster --clobber
